<!DOCTYPE html>
<html>
<head>
    <title>Login & Register</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="phone" placeholder="Enter Phone"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<hr>

<h2>Register</h2>

<input type="text" id="regName" placeholder="Enter Name"><br><br>
<input type="text" id="regPhone" placeholder="Enter Phone"><br><br>
<input type="password" id="regPassword" placeholder="Enter Password"><br><br>

<button onclick="register()">Register</button>

<script src="script.js"></script>

</body>
</html>
